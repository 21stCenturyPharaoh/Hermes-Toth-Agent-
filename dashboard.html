<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Hermes-Toth Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-white">
<header class="border-b border-amber-500/30 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
  <div class="container mx-auto px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="text-xl font-black text-amber-400 glow-gold">← Command Center</a>
    <h1 class="text-lg font-bold text-amber-300">Mission Control</h1>
  </div>
</header>

<main class="container mx-auto px-6 py-12">
  <div class="grid md:grid-cols-2 gap-6 mb-8">
    <div class="p-6 bg-slate-900/40 border border-amber-500/30 rounded-2xl">
      <h2 class="text-xl font-bold text-amber-300 mb-3">System Status</h2>
      <p class="text-gray-400">Mode: <span class="text-emerald-400 font-bold">Static Site Live</span></p>
      <p class="text-gray-400">Workers: <span class="text-yellow-400 font-bold">Planned Block 2</span></p>
      <p class="text-gray-400">KV Memory: <span class="text-yellow-400 font-bold">Planned Block 4</span></p>
    </div>
    <div class="p-6 bg-slate-900/40 border-emerald-500/30 rounded-2xl">
      <h2 class="text-xl font-bold text-emerald-300 mb-3">Active Angels</h2>
      <div id="angel-count" class="text-3xl font-black text-emerald-400">Loading...</div>
      <p class="text-gray-400 text-sm">7 Specialists Standing By</p>
    </div>
  </div>

  <div class="p-6 bg-slate-900/40 border-blue-500/30 rounded-2xl">
    <h2 class="text-xl font-bold text-blue-300 mb-4">Angel Roster</h2>
    <div id="agents-grid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
  </div>
</main>

<footer class="mt-16 border-t border-slate-800 py-6 text-center text-gray-500 text-xs">
  Dashboard v1.0 | Reads data/agents.json
</footer>
<script src="js/dashboard.js"></script>
</body></html>
